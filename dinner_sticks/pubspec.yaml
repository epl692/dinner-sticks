name: dinner_sticks
description: A meal planning app with pools of meal ideas and weekly selections.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  riverpod_annotation: ^2.3.5
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.9
  coverage: ^1.7.2
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  mockito: ^5.4.4
  riverpod_generator: ^2.4.0
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
